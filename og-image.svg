    <rect x="384" y="327" width="32" height="73" rx="8" fill="#059669" opacity="0.09" transform="rotate(12, -87, -12)"/>
    <rect x="629" y="-90" width="64" height="93" rx="8" fill="#059669" opacity="0.05" transform="rotate(28, 429, 484)"/>
    <rect x="900" y="22" width="53" height="54" rx="8" fill="#059669" opacity="0.04" transform="rotate(4, 446, 210)"/>
    <polygon points="707,-57 806,141 608,141" fill="#047857" opacity="0.12"/>
    <polygon points="1038,614 1088,714 988,714" fill="#047857" opacity="0.07"/>
    <polygon points="539,-174 625,-2 453,-2" fill="#047857" opacity="0.09"/>
    <polygon points="924,603 948,651 900,651" fill="#047857" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,552 C360,591 840,513 1200,552 L1200,630 L0,630Z" fill="#047857" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
